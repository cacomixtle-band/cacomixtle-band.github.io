<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Datos de Transferencia</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./scripts/copy.js"  defer></script>
</head>

<body>
  <main>
    <header>
        <a href="https://cacomixtle-band.github.io/">
            <div class="logo"></div>
            <h1>cacomixtle</h1>
        </a>
        <p>Una banda de rock en tu idioma.</p>
        <h2>Datos de transferencia</h2>
    </header>

    <section class="card">
      <div class="field">
        <span class="label">Banco</span>
        <div class="value">
          <span>Bancomer</span>
        </div>
      </div>

      <div class="field">
        <span class="label">Beneficiario</span>
        <div class="value">
          <span data-copy>José Roberto Calderón de Alba</span>
          <button class="copy-btn">Copiar</button>
        </div>
      </div>

      <div class="field">
        <span class="label">Tarjeta</span>
        <div class="value">
          <span data-copy>4152 3138 1511 7101</span>
          <button class="copy-btn">Copiar</button>
        </div>
      </div>

      <div class="field">
        <span class="label">Cuenta</span>
        <div class="value">
          <span data-copy>155 885 9245</span>
          <button class="copy-btn">Copiar</button>
        </div>
      </div>

      <div class="field">
        <span class="label">CLABE</span>
        <div class="value">
          <span data-copy>0121 8001 5588</span>
          <button class="copy-btn">Copiar</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
